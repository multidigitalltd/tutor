name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (PHP + JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: PHP syntax check
        run: find md-deschool -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JS syntax check
        run: |
          node --check md-deschool/assets/js/frontend.js
          node --check md-deschool/assets/js/admin.js

  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    # Informational: surfaces standards violations without blocking the PR.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run PHPCS
        run: composer run-script lint
